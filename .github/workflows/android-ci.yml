name: Android CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Quality, tests, and debug APKs
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run quality checks, tests, and debug builds
        run: |
          ./gradlew \
            qualityCheck \
            :core:common:test \
            :core:model:test \
            :core:database:testDebugUnitTest \
            :core:database:assembleDebug \
            :domain:transactions:test \
            :feature:dashboard:testDebugUnitTest \
            :app:testPersonalDebugUnitTest \
            :app:testPlayDebugUnitTest \
            :app:assemblePersonalDebug \
            :app:assemblePlayDebug \
            --no-daemon \
            --max-workers=2 \
            --console=plain \
            --stacktrace

      - name: Upload personal debug APK
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: project-ledger-personal-debug
          path: app/build/outputs/apk/personal/debug/app-personal-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Play-safe debug APK
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: project-ledger-play-debug
          path: app/build/outputs/apk/play/debug/app-play-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostic reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: project-ledger-ci-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7
